<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" fill="none">
  <style>
    text { font-family: 'IBM Plex Mono', monospace; }
    .sub { font-size: 8px; fill: #6b839e; }
    .tier { stroke: #1a2535; stroke-width: 1; fill: none; rx: 6; }
    .warp { stroke: #1a2535; stroke-width: 1; fill: none; rx: 4; stroke-dasharray: 3 2; }
    .thread { fill: #38bdf8; rx: 2; }
  </style>

  <!-- Grid -->
  <rect class="tier" x="8" y="8" width="464" height="284" />
  <text class="sub" x="20" y="24">Grid</text>

  <!-- Block 0 -->
  <rect class="tier" x="20" y="36" width="216" height="244" />
  <text class="sub" x="32" y="52">Block 0</text>

  <!-- Warp 0 -->
  <rect class="warp" x="32" y="60" width="192" height="48" />
  <text class="sub" x="44" y="74">Warp 0</text>
  <rect class="thread" x="44" y="82" width="8" height="8" opacity="0.6"/>
  <rect class="thread" x="56" y="82" width="8" height="8" opacity="0.55"/>
  <rect class="thread" x="68" y="82" width="8" height="8" opacity="0.5"/>
  <rect class="thread" x="80" y="82" width="8" height="8" opacity="0.45"/>
  <rect class="thread" x="92" y="82" width="8" height="8" opacity="0.4"/>
  <rect class="thread" x="104" y="82" width="8" height="8" opacity="0.38"/>
  <rect class="thread" x="116" y="82" width="8" height="8" opacity="0.35"/>
  <rect class="thread" x="128" y="82" width="8" height="8" opacity="0.32"/>
  <text class="sub" x="144" y="91">... 32 threads</text>

  <!-- Warp 1 -->
  <rect class="warp" x="32" y="116" width="192" height="48" />
  <text class="sub" x="44" y="130">Warp 1</text>
  <rect class="thread" x="44" y="138" width="8" height="8" opacity="0.6"/>
  <rect class="thread" x="56" y="138" width="8" height="8" opacity="0.55"/>
  <rect class="thread" x="68" y="138" width="8" height="8" opacity="0.5"/>
  <rect class="thread" x="80" y="138" width="8" height="8" opacity="0.45"/>
  <rect class="thread" x="92" y="138" width="8" height="8" opacity="0.4"/>
  <rect class="thread" x="104" y="138" width="8" height="8" opacity="0.38"/>
  <rect class="thread" x="116" y="138" width="8" height="8" opacity="0.35"/>
  <rect class="thread" x="128" y="138" width="8" height="8" opacity="0.32"/>
  <text class="sub" x="144" y="147">... 32 threads</text>

  <!-- Warp ... -->
  <rect class="warp" x="32" y="172" width="192" height="28" />
  <text class="sub" x="120" y="190" text-anchor="middle">...</text>

  <!-- Block 0 notes -->
  <text class="sub" x="32" y="220">shared memory between warps</text>
  <line x1="32" y1="224" x2="224" y2="224" stroke="#1a2535" stroke-width="0.5" stroke-dasharray="2 2"/>
  <text class="sub" x="32" y="270">up to 1024 threads per block</text>

  <!-- Block 1 -->
  <rect class="tier" x="248" y="36" width="212" height="80" />
  <text class="sub" x="260" y="52">Block 1</text>
  <rect class="warp" x="260" y="60" width="188" height="20" />
  <text class="sub" x="354" y="74" text-anchor="middle">Warp 0 ... Warp N</text>
  <text class="sub" x="260" y="106">same structure as Block 0</text>

  <!-- Block 2 -->
  <rect class="tier" x="248" y="128" width="212" height="80" />
  <text class="sub" x="260" y="144">Block 2</text>
  <rect class="warp" x="260" y="152" width="188" height="20" />
  <text class="sub" x="354" y="166" text-anchor="middle">Warp 0 ... Warp N</text>
  <text class="sub" x="260" y="198">same structure as Block 0</text>

  <!-- Block ... -->
  <rect class="tier" x="248" y="220" width="212" height="60" />
  <text class="sub" x="354" y="255" text-anchor="middle">... Block N</text>
</svg>
