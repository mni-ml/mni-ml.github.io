  <!-- Row 5: ML attending to... -->
  <rect x="96" y="248" width="48" height="40" rx="3" fill="#38bdf8" opacity="0.06"/>
  <rect x="144" y="248" width="48" height="40" rx="3" fill="#38bdf8" opacity="0.15"/>
  <rect x="192" y="248" width="48" height="40" rx="3" fill="#38bdf8" opacity="0.08"/>
  <rect x="240" y="248" width="48" height="40" rx="3" fill="#38bdf8" opacity="0.25"/>
  <rect x="288" y="248" width="48" height="40" rx="3" fill="#38bdf8" opacity="0.6"/>
</svg>
